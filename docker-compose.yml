services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: buildguard
      POSTGRES_USER: buildguard
      POSTGRES_PASSWORD: buildguard
    volumes:
      - buildguard_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildguard"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/buildguard
      DB_USERNAME: buildguard
      DB_PASSWORD: buildguard
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  buildguard_db:
