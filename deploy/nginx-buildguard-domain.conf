server {
    server_name buildguard.qivoria.com;

    client_max_body_size 20m;
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types application/javascript application/json text/css;

    location /buildguard/api/ {
        proxy_pass http://127.0.0.1:18082/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /buildguard/assets/ {
        alias /opt/buildguard/frontend/assets/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /buildguard/ {
        alias /opt/buildguard/frontend/;
        try_files $uri $uri/ /buildguard/index.html;
    }

    location / {
        root /opt/buildguard/frontend;
        try_files $uri $uri/ /index.html;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/buildguard.qivoria.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/buildguard.qivoria.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = buildguard.qivoria.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name buildguard.qivoria.com;
    return 404; # managed by Certbot


}