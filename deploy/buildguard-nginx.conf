server {
    listen 80;
    listen [::]:80;
    server_name 122.51.227.54;

    client_max_body_size 20m;
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types application/javascript application/json text/css;

    location = /buildguard {
        return 301 /buildguard/;
    }

    location /buildguard/api/ {
        proxy_pass http://127.0.0.1:18082/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /buildguard/assets/ {
        alias /opt/buildguard/frontend/assets/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /buildguard/ {
        alias /opt/buildguard/frontend/;
        try_files $uri $uri/ /buildguard/index.html;
    }

    location / {
        return 404;
    }
}
